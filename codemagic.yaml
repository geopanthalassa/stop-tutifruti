workflows:
  android-release:
    name: Android — build and publish
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      groups:
        - google_play        # add in Codemagic UI: GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        - supabase            # add in Codemagic UI: NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY
      node: 20.11.1
    triggering:
      events: [push]
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build static export
        script: npm run build
      - name: Add Android platform
        script: npx cap add android || true
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build signed AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal          # promote manually to production once you're confident
        submit_as_draft: true

